apiVersion: score.dev/v1b1
metadata:
  name: hello-aws-1
containers:
  hello-world:
    image: .
    variables:
      S3_PRIVATE_BUCKET_1_NAME: ${resources.private-bucket-1.name}
      S3_BUCKET_1_NAME: ${resources.bucket-1.name}
resources:
  private-bucket-1:
    type: s3
    class: read-only
    # no "id" for a private resource
  bucket-1:
    type: s3
    class: read-only
    id: bucket-1
