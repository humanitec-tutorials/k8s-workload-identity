apiVersion: entity.humanitec.io/v1b1
kind: Definition
metadata:
  id: wi-aws-sqs-iam-policy-read-only
entity:
  driver_type: humanitec/terraform
  name: wi-aws-sqs-iam-policy-read-only
  type: aws-policy
  # The identity used in this Cloud Account needs permissions to create IAM policies
  driver_account: ${resources['config.default#app-config'].account}
  driver_inputs:
    values:
      append_logs_to_error: true
      variables:
        app_id: "${context.app.id}"
        env_id: "${context.env.id}"
        res_id: "${context.res.id}"
        region: ${resources['config.default#app-config'].outputs.region}
        # The Globally Unique Resource ID (GUResID) is useful for ensuring uniqueness
        guresid: ${context.res.guresid}
        sqs_arn: ${resources['sqs.read-only'].outputs.arn}
      credentials_config:
        environment:
          AWS_ACCESS_KEY_ID: AccessKeyId
          AWS_SECRET_ACCESS_KEY: SecretAccessKey
          AWS_SESSION_TOKEN: SessionToken
      files:
        providers.tf: |
          terraform {
            required_providers {
              aws = {
                source  = "hashicorp/aws"
              }
            }
          }
        variables.tf: |
          variable "app_id" {}
          variable "env_id" {}
          variable "res_id" {}
          variable "region" {}
          variable "guresid" {}
          variable "sqs_arn" {}
        main.tf: |
          # Provider credentials are being injected through environment variables
          provider "aws" {
            region = var.region
            default_tags {
              tags = {
                humanitec  = "true"
                hum-app    = var.app_id
                hum-env    = var.env_id
                hum-res    = replace(var.res_id, ".", "-")
                managed-by = "terraform"
              }
            }
          }
          # Prepare the policy document
          data "aws_iam_policy_document" "sqs_read_only" {
            statement {
              sid = "SQSreadonly"
              effect = "Allow"
              actions = [
                "sqs:GetQueueAttributes",
                "sqs:GetQueueUrl",
                "sqs:ListDeadLetterSourceQueues",
                "sqs:ListQueues",
                "sqs:ListMessageMoveTasks",
                "sqs:ListQueueTags"
              ]
              resources = [
                var.sqs_arn
              ]
            }
          }
          # Create the IAM policy
          resource "aws_iam_policy" "policy" {
            name        = var.guresid
            path        = "/"
            description = "Read Only IAM Policy for SQS $\{var.sqs_arn}"
            policy      = data.aws_iam_policy_document.sqs_read_only.json
          }
        outputs.tf: |
          output "arn" {
            value = aws_iam_policy.policy.arn
          }
  criteria:
  - class: sqs-read-only