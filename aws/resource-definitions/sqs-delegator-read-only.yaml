# This Resource Definition of type `sqs` implements a "Delegator" resource for the class "read-only"
apiVersion: entity.humanitec.io/v1b1
kind: Definition
metadata:
  id: wi-aws-sqs-delegator-read-only
entity:
  driver_type: humanitec/echo
  name: wi-aws-sqs-delegator-read-only
  type: sqs
  driver_inputs:
    values:
      # Referencing the "concrete" Resource and passing through all of its outputs
      arn: ${resources['sqs.concrete'].outputs.arn}
      region: ${resources['sqs.concrete'].outputs.region}
      url: ${resources['sqs.concrete'].outputs.url}
  provision:
    # Co-provision an IAM Policy resource for this class of sqs
    aws-policy.sqs-read-only:
      match_dependents: true
  # Adjust matching criteria as required, but must match class "read-only"
  criteria:
  - class: read-only
    app_id: workload-identity-test-aws